name: Release

# Triggered when you push a tag like `v0.1.0`, `v0.2.0-beta`, etc.
# To cut a release locally:
#   git tag v0.1.0
#   git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'
  # Allow manual trigger from the Actions tab for testing.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        type: string
  # Allow auto-tag.yml (push → main) to build+publish the release it just
  # tagged, in the same workflow run (no GITHUB_TOKEN recursion limit).
  workflow_call:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write    # needed to create releases

jobs:
  build-and-release:
    name: Build universal .dmg and publish release
    # macos-15 ships Xcode 16 (Swift 6) which Package.swift requires for
    # `swift-tools-version: 6.0` + Testing.framework. Apple Silicon (M1).
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # tag push → GITHUB_REF is the tag. workflow_dispatch/workflow_call →
          # inputs.version is the tag we want to build (e.g. auto-tag.yml just
          # pushed it). Both are valid refs.
          ref: ${{ inputs.version || github.ref }}
          # Full history + tags so the changelog step can git-log between
          # the previous v* tag and the current one. Without fetch-depth: 0
          # `git describe --tags` returns nothing and the changelog is empty.
          fetch-depth: 0
          fetch-tags: true

      - name: Select Xcode 16 (Swift 6)
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # inputs.version is set for workflow_dispatch + workflow_call;
          # empty for a tag push, where the tag lives in GITHUB_REF.
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          # Strip leading "v" for the Make VERSION var so artifact filenames
          # don't end up with double-v (e.g. ai-taskbar-v0.1.0.dmg → 0.1.0).
          VERSION_NUM="${VERSION#v}"
          echo "tag=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "number=$VERSION_NUM"    >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$VERSION number=$VERSION_NUM"

      - name: Show toolchain info
        run: |
          swift --version
          xcodebuild -version || true
          uname -a

      - name: Build universal .app + DMG
        run: |
          make dmg-universal VERSION="${{ steps.version.outputs.number }}"

      - name: Verify universal binary
        run: |
          file build/AiTaskbar.app/Contents/MacOS/ai-taskbar
          lipo -archs build/AiTaskbar.app/Contents/MacOS/ai-taskbar
          codesign --verify --deep --strict --verbose=2 build/AiTaskbar.app

      - name: Run validation suite
        run: |
          # Compile-only validation; smoke launch is skipped in CI because
          # the runner has no Keychain entries and no `~/.codex/auth.json`.
          # We rely on the runtime asserts (no network, no creds needed).
          swift run ai-taskbar-validate

      - name: Compute SHA256 (for Homebrew Cask updates)
        id: shasum
        run: |
          SHA256=$(shasum -a 256 "ai-taskbar-${{ steps.version.outputs.number }}.dmg" | awk '{print $1}')
          echo "sha=$SHA256"   >> "$GITHUB_OUTPUT"
          echo "DMG SHA256: $SHA256"

      - name: Generate changelog from commit history
        id: changelog
        run: |
          # Walk commits since the previous v* tag. With fetch-depth: 0 on
          # checkout, `git describe` can walk back; the previous-tag heuristic
          # is robust against either tag-on-bump-commit or tag-on-source-commit.
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ steps.version.outputs.tag }}^" 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then
            # Fallback: list v* tags by commit-date descending, pick the 2nd.
            PREV_TAG=$(git tag --list 'v*' --sort=-creatordate | sed -n '2p')
          fi
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${{ steps.version.outputs.tag }}"
          else
            RANGE="HEAD"
          fi
          echo "Using changelog range: $RANGE (PREV_TAG=$PREV_TAG)"

          {
            echo "## Changes"
            echo
            # Group by type. The sed strips the `type(scope): ` prefix per
            # bullet so the rendered list reads as plain English. Skip
            # chore(release)/[skip release] commits — those are auto-generated
            # by the bump workflow and add no information.
            for TYPE in feat feature fix perf refactor; do
              HEADER=""
              case $TYPE in
                feat|feature) HEADER="✨ Features";;
                fix)          HEADER="🐛 Fixes";;
                perf)         HEADER="⚡️ Performance";;
                refactor)     HEADER="♻️ Refactor";;
              esac
              COMMITS=$(git log --pretty=format:'%s' --no-merges "$RANGE" \
                        | grep -iE "^${TYPE}(\(|:)" \
                        | grep -vE '\[skip release\]|chore\(release\)' \
                        | sed -E "s/^[^:]*:\s*//")
              if [ -n "$COMMITS" ]; then
                echo "### $HEADER"
                echo
                echo "$COMMITS" | sed 's/^/- /'
                echo
              fi
            done
            # Other (docs, chore, ci, style, test, build) — collapsed under
            # a single "Maintenance" group so the changelog isn't noisy.
            MAINT=$(git log --pretty=format:'%s' --no-merges "$RANGE" \
                    | grep -viE '^(feat|feature|fix|perf|refactor)(\(|:)' \
                    | grep -vE '\[skip release\]|chore\(release\)' \
                    | head -n 20 \
                    | sed -E "s/^[^:]*:\s*//")
            if [ -n "$MAINT" ]; then
              echo "### 🧰 Maintenance"
              echo
              echo "$MAINT" | sed 's/^/- /'
              echo
            fi
            echo "---"
            echo
            echo "**Full diff:** [\`${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1 | cut -c1-7)}...${{ steps.version.outputs.tag }}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${{ steps.version.outputs.tag }})"
          } > /tmp/changelog.md
          echo "## Changelog preview"
          cat /tmp/changelog.md

      - name: Generate release notes
        id: notes
        run: |
          cat > /tmp/release_notes.md <<EOF
          ## AI Taskbar ${{ steps.version.outputs.tag }}

          Universal macOS menu-bar tracker for LLM usage (Anthropic Claude, OpenAI Codex/ChatGPT, OpenRouter, Z.AI, Kimi/Moonshot).

          ### Install
          1. Download \`ai-taskbar-${{ steps.version.outputs.number }}.dmg\` below.
          2. Open the DMG and drag \`AiTaskbar.app\` to the \`Applications\` folder (symlink included in the image).
          3. First launch: macOS Gatekeeper will warn that the app is from an unidentified developer. Either:
             - **Right-click \`AiTaskbar.app\` → Open**, then click **Open** in the dialog.
             - Or run: \`xattr -dr com.apple.quarantine /Applications/AiTaskbar.app\`

          ### What you get
          - Universal binary (Apple Silicon + Intel)
          - macOS 13 (Ventura) or newer
          - Read-only access to your existing Claude / Codex / Z.AI / Kimi / OpenRouter credentials
          - All cache + config locked to \`0o600\` (user-only)

          EOF
          # Append the auto-generated changelog.
          cat /tmp/changelog.md >> /tmp/release_notes.md
          # Append the asset checksum footer.
          cat >> /tmp/release_notes.md <<EOF

          ### Asset checksum
          \`\`\`
          SHA256: ${{ steps.shasum.outputs.sha }}
          \`\`\`

          See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup.
          EOF
          echo "## Final release notes"
          cat /tmp/release_notes.md

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AI Taskbar ${{ steps.version.outputs.tag }}
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: |
            ai-taskbar-${{ steps.version.outputs.number }}.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
